<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Anywhere Transfer</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #5856d6; --success: #34c759; --bg: #f2f2f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .status-box { padding: 10px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; font-size: 14px; }
        .waiting { background: #fff3cd; color: #856404; }
        .connected { background: #d4edda; color: #155724; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; transition: 0.3s; margin: 5px 0; }
        .btn-copy { background: #8e8e93; font-size: 13px; padding: 8px; }
        #link-display { background: #e5e5ea; padding: 10px; border-radius: 8px; font-size: 11px; word-break: break-all; margin: 10px 0; border: 1px dashed #999; }
        input[type="file"] { margin: 20px 0; width: 100%; }
        #progress { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-top: 10px; display: none; }
        #progress-bar { width: 0%; height: 100%; background: var(--success); border-radius: 3px; transition: 0.3s; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0">🚀 P2P Send</h2>
    
    <div id="status" class="status-box waiting">กำลังตั้งค่าระบบ...</div>

    <div id="setup-ui">
        <p style="font-size: 14px; color: #666;">ส่งลิงก์นี้ให้ iPad (หรือเครื่องปลายทาง):</p>
        <div id="link-display">สร้างลิงก์สำเร็จ...</div>
        <button class="btn btn-copy" onclick="copyLink()">คัดลอกลิงก์</button>
    </div>

    <div id="transfer-ui" style="display:none;">
        <input type="file" id="file-input">
        <button class="btn" onclick="sendFile()">ส่งไฟล์ทันที</button>
        <div id="progress"><div id="progress-bar"></div></div>
    </div>
</div>

<script>
    const statusDiv = document.getElementById('status');
    const linkDisplay = document.getElementById('link-display');
    const setupUI = document.getElementById('setup-ui');
    const transferUI = document.getElementById('transfer-ui');
    const progressBar = document.getElementById('progress-bar');
    const progressCont = document.getElementById('progress');

    // --- ส่วนสำคัญ: ตั้งค่า STUN Server ของ Google เพื่อให้ใช้งานข้าม Network ได้ ---
    const peer = new Peer({
        config: {
            'iceServers': [
                { url: 'stun:stun.l.google.com:19302' },
                { url: 'stun:stun1.l.google.com:19302' },
                { url: 'stun:stun2.l.google.com:19302' }
            ]
        }
    });

    let conn = null;

    peer.on('open', (id) => {
        const fullLink = window.location.origin + window.location.pathname + '?join=' + id;
        linkDisplay.innerText = fullLink;
        statusDiv.innerText = "สถานะ: รอคนกดลิงก์...";
        
        // เช็คว่าเราเป็นคนกดลิงก์มาเองหรือไม่
        const urlParams = new URLSearchParams(window.location.search);
        const joinId = urlParams.get('join');
        if (joinId) {
            connectTo(joinId);
        }
    });

    // รอรับการเชื่อมต่อ
    peer.on('connection', (c) => {
        conn = c;
        initConnection();
    });

    function connectTo(id) {
        statusDiv.innerText = "กำลังเชื่อมต่อกับเครื่องต้นทาง...";
        conn = peer.connect(id, { reliable: true });
        initConnection();
    }

    function initConnection() {
        conn.on('open', () => {
            statusDiv.innerText = "เชื่อมต่อสำเร็จ! พร้อมรับ-ส่ง";
            statusDiv.className = "status-box connected";
            setupUI.style.display = "none";
            transferUI.style.display = "block";
        });

        conn.on('data', (data) => {
            if (data.type === "file") {
                statusDiv.innerText = "ได้รับไฟล์: " + data.name;
                const blob = new Blob([data.file], { type: data.fileType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = data.name;
                a.click();
                alert("ได้รับไฟล์เรียบร้อย!");
            }
        });

        conn.on('close', () => {
            statusDiv.innerText = "การเชื่อมต่อหลุด";
            statusDiv.className = "status-box waiting";
            location.reload(); // รีโหลดเพื่อเริ่มใหม่
        });
    }

    function sendFile() {
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];
        if (!file) return alert("กรุณาเลือกไฟล์");

        progressCont.style.display = "block";
        progressBar.style.width = "50%"; // หลอกว่ากำลังโหลด

        const reader = new FileReader();
        reader.onload = (e) => {
            conn.send({
                type: "file",
                file: e.target.result,
                name: file.name,
                fileType: file.type
            });
            progressBar.style.width = "100%";
            setTimeout(() => {
                alert("ส่งไฟล์สำเร็จ!");
                progressCont.style.display = "none";
                progressBar.style.width = "0%";
            }, 500);
        };
        reader.readAsArrayBuffer(file);
    }

    function copyLink() {
        navigator.clipboard.writeText(linkDisplay.innerText);
        alert("คัดลอกลิงก์แล้ว! ส่งทางแชทให้ iPad ได้เลย");
    }
</script>
</body>
</html>
